name: Update Untappd menus

on:
  schedule:
    # каждый час в 00 минут (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: {}  # позволяет запустить вручную из вкладки Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python3 scraper.py

      - name: Commit updated CSV
        run: |
          git config user.name "menu-bot"
          git config user.email "menu-bot@users.noreply.github.com"
          git add output/current_menu.csv output/current_menu.json output/menu_history.csv
          git diff --staged --quiet || git commit -m "Update menus $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
